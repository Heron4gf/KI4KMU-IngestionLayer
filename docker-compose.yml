services:
  api:
    build: .
    container_name: pdf-ingestion-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION}
      - UNSTRUCTURED_URL=${UNSTRUCTURED_URL}
      - UNSTRUCTURED_CHUNKING_STRATEGY=${UNSTRUCTURED_CHUNKING_STRATEGY}
      - UNSTRUCTURED_MAX_CHARACTERS=${UNSTRUCTURED_MAX_CHARACTERS}
      - UNSTRUCTURED_OVERLAP=${UNSTRUCTURED_OVERLAP}
      - LMSTUDIO_URL=${LMSTUDIO_URL}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL}
      - CAPTION_MAX_TOKENS=${CAPTION_MAX_TOKENS}
      - CAPTIONER_PROMPT_PATH=${CAPTIONER_PROMPT_PATH}
    volumes:
      - ./prompts/captioner.md:/app/prompts/captioner.md:ro
    depends_on:
      - chromadb
      - unstructured
      - graphdb
    networks:
      - backend


  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - ./chroma-data:/data
    ports:
      - "8000:8000"
    networks:
      - backend


  unstructured:
    image: robwilkes/unstructured-api:latest
    container_name: unstructured
    restart: unless-stopped
    ports:
      - "8002:8000"
    networks:
      - backend


  graphdb:
    image: ontotext/graphdb:${GRAPHDB_VERSION}
    container_name: graphdb
    restart: unless-stopped
    ports:
      - "${GRAPHDB_PORT}:7200"
    volumes:
      - ./graphdb-data:/opt/graphdb/home
    environment:
      - GDB_JAVA_OPTS=${GDB_JAVA_OPTS}
      - GRAPHDB_URL=${GRAPHDB_URL}
      - GRAPHDB_REPOSITORY=${GRAPHDB_REPOSITORY}
      - GRAPHDB_BASE_NS=${GRAPHDB_BASE_NS}
      - GRAPHDB_USER=${GRAPHDB_USER}
      - GRAPHDB_PASSWORD=${GRAPHDB_PASSWORD}
    networks:
      - backend

  langextract:
    build: ./langextract-service
    container_name: langextract
    restart: unless-stopped
    ports:
      - "${LANGEXTRACT_PORT}:8003"
    env_file:
      - .env
    environment:
      - LANGEXTRACT_BASE_URL=${LANGEXTRACT_BASE_URL}
      - LANGEXTRACT_API_KEY=${LANGEXTRACT_API_KEY}
      - LANGEXTRACT_MODEL_ID=${LANGEXTRACT_MODEL_ID}
      - LANGEXTRACT_PROMPT_PATH=${LANGEXTRACT_PROMPT_PATH}
    volumes:
      - ./prompts:/prompts:ro
    networks:
      - backend

networks:
  backend:
