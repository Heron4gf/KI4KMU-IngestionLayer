services:
  api:
    build: .
    container_name: pdf-ingestion-api
    restart: unless-stopped
    ports:
      - "8053:8001"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION}
      - UNSTRUCTURED_URL=${UNSTRUCTURED_URL}
      - UNSTRUCTURED_CHUNKING_STRATEGY=${UNSTRUCTURED_CHUNKING_STRATEGY}
      - UNSTRUCTURED_MAX_CHARACTERS=${UNSTRUCTURED_MAX_CHARACTERS}
      - UNSTRUCTURED_OVERLAP=${UNSTRUCTURED_OVERLAP}
      - CAPTIONING_AI_BASE_URL=${CAPTIONING_AI_BASE_URL}
      - CAPTIONING_AI_MODEL=${CAPTIONING_AI_MODEL}
      - CAPTIONING_AI_API_KEY=${CAPTIONING_AI_API_KEY}
      - CAPTION_MAX_TOKENS=${CAPTION_MAX_TOKENS}
      - CAPTIONER_PROMPT_PATH=${CAPTIONER_PROMPT_PATH}
      - LANGEXTRACT_URL=http://langextract:8003
      - GRAPHDB_URL=${GRAPHDB_URL}
      - GRAPHDB_REPOSITORY=${GRAPHDB_REPOSITORY}
      - GRAPHDB_BASE_NS=${GRAPHDB_BASE_NS}
      - GRAPHDB_USER=${GRAPHDB_USER}
      - GRAPHDB_PASSWORD=${GRAPHDB_PASSWORD}
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/ki4kmu_data/.hf_cache
      - EMBEDDING_MODEL_PATH=/ki4kmu_data/embedding-model
    volumes:
      - ./prompts/captioner.md:/prompts/captioner.md:ro
      - ki4kmu_data:/ki4kmu_data
    depends_on:
      - chromadb
      - unstructured
      - graphdb
    networks:
      - backend



  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - ki4kmu_data:/ki4kmu_data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/ki4kmu_data/chroma-data
    ports:
      - "8000:8000"
    networks:
      - backend



  unstructured:
    image: robwilkes/unstructured-api:latest
    container_name: unstructured
    restart: unless-stopped
    ports:
      - "8002:8000"
    networks:
      - backend



  graphdb:
    image: ontotext/graphdb:${GRAPHDB_VERSION}
    container_name: graphdb
    restart: unless-stopped
    ports:
      - "${GRAPHDB_PORT}:7200"
    volumes:
      - ki4kmu_data:/ki4kmu_data
    environment:
      - GDB_JAVA_OPTS=${GDB_JAVA_OPTS}
      - GRAPHDB_URL=${GRAPHDB_URL}
      - GRAPHDB_REPOSITORY=${GRAPHDB_REPOSITORY}
      - GRAPHDB_BASE_NS=${GRAPHDB_BASE_NS}
      - GRAPHDB_USER=${GRAPHDB_USER}
      - GRAPHDB_PASSWORD=${GRAPHDB_PASSWORD}
    networks:
      - backend


  langextract:
    build: ./langextract_service
    container_name: langextract
    restart: unless-stopped
    ports:
      - "${LANGEXTRACT_PORT}:8003"
    env_file:
      - .env
    environment:
      - LANGEXTRACT_BASE_URL=${LANGEXTRACT_BASE_URL}
      - LANGEXTRACT_API_KEY=${LANGEXTRACT_API_KEY}
      - LANGEXTRACT_MODEL_ID=${LANGEXTRACT_MODEL_ID}
      - LANGEXTRACT_PROMPT_PATH=${LANGEXTRACT_PROMPT_PATH}
    volumes:
      - ./prompts:/prompts:ro
    networks:
      - backend


  gui:
    build: ./gui
    container_name: pdf-ingestion-gui
    restart: unless-stopped
    ports:
      - "${GUI_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8001/v1
    depends_on:
      - api
    networks:
      - backend


networks:
  backend:

volumes:
  ki4kmu_data:
    name: ki4kmu_data
